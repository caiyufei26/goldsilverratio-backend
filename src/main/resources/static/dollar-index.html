<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美元指数</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }
    .btn:hover { background: rgba(59, 130, 246, 0.3); }
    .status { text-align: center; padding: 12px; color: #94a3b8; font-size: 0.9rem; }
    .status.loading { color: #60a5fa; }
    .status.error { color: #e57373; }
    .card.feed h2 { font-size: 1rem; color: #94a3b8; margin: 0 0 16px 0; font-weight: 500; }
    .hint { color: #64748b; font-size: 0.8rem; margin-bottom: 12px; line-height: 1.4; }
    .btn.primary {
      background: rgba(59, 130, 246, 0.25);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, 0.5);
      width: 100%;
      margin-top: 8px;
    }
    .btn.primary:hover { background: rgba(59, 130, 246, 0.35); }
    .form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .form-row label { width: 100px; color: #94a3b8; font-size: 0.9rem; }
    .form-row input, .form-row select {
      flex: 1;
      max-width: 160px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
    }
    .form-row-month {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-row-month label { color: #94a3b8; font-size: 0.9rem; flex-shrink: 0; }
    .form-row-month input[type="month"] {
      flex: 1;
      max-width: 160px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
    }
    .table-wrap { overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { color: #94a3b8; font-weight: 500; }
    td.value-close { color: #60a5fa; }
    .empty-tip { color: #64748b; padding: 24px; text-align: center; }
    .chart-wrap { position: relative; height: 220px; margin-top: 16px; margin-bottom: 16px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>美元指数</h1>
    <p class="subtitle">每日收盘价 · DXY</p>

    <div class="card feed">
      <h2>获取该月数据</h2>
      <p class="hint">通过汇率 API 计算 DXY，逐日获取当月已过日期的数据并保存。</p>
      <div class="form-row-month">
        <label>年月</label>
        <input type="month" id="fetchMonthPicker">
      </div>
      <button type="button" class="btn primary" id="btnFetchMonth">获取该月美元指数</button>
      <div class="status" id="fetchStatus"></div>
    </div>

    <div class="card feed">
      <h2>每日美元指数列表</h2>
      <p class="hint">选择年月查看该月数据，图表与列表同步切换。</p>
      <div class="form-row-month">
        <label>年月</label>
        <input type="month" id="listMonthPicker">
      </div>
      <button type="button" class="btn" id="btnRefreshList">刷新列表</button>
      <div class="chart-wrap">
        <canvas id="dxyChart"></canvas>
      </div>
      <div class="table-wrap">
        <table id="dxyTable">
          <thead>
            <tr>
              <th>数据日期</th>
              <th>收盘价</th>
            </tr>
          </thead>
          <tbody id="dxyTableBody"></tbody>
        </table>
      </div>
      <div class="status" id="listStatus"></div>
    </div>

    <p style="text-align:center;margin-top:24px;">
      <a href="/" style="color:#64748b;font-size:0.9rem;">返回首页</a>
    </p>
  </div>

  <script>
    (function () {
      function toYYYYMMDD(d) {
        var y = d.getFullYear();
        var m = (d.getMonth() + 1);
        var day = d.getDate();
        return '' + y + (m < 10 ? '0' : '') + m + (day < 10 ? '0' : '') + day;
      }

      var fetchMonthPicker = document.getElementById('fetchMonthPicker');
      var btnFetchMonth = document.getElementById('btnFetchMonth');
      var fetchStatus = document.getElementById('fetchStatus');

      (function setDefaultFetchMonth() {
        var d = new Date();
        fetchMonthPicker.value = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      })();

      btnFetchMonth.addEventListener('click', function () {
        var val = (fetchMonthPicker.value || '').trim();
        if (!val) {
          fetchStatus.textContent = '请选择年月';
          fetchStatus.className = 'status error';
          return;
        }
        var parts = val.split('-');
        var year = parseInt(parts[0], 10);
        var month = parseInt(parts[1], 10);
        btnFetchMonth.disabled = true;
        fetchStatus.textContent = '正在获取该月美元指数…';
        fetchStatus.className = 'status loading';
        fetch('/api/dollar-index/fetch-month?year=' + year + '&month=' + month)
          .then(function (res) { return res.json(); })
          .then(function (result) {
            btnFetchMonth.disabled = false;
            if (result && result.code === 200) {
              fetchStatus.textContent = result.data || '已保存';
              fetchStatus.className = 'status';
              listMonthPicker.value = fetchMonthPicker.value;
              loadDxyList();
            } else {
              fetchStatus.textContent = (result && result.message) || '获取失败';
              fetchStatus.className = 'status error';
            }
          })
          .catch(function (err) {
            btnFetchMonth.disabled = false;
            fetchStatus.textContent = '失败：' + (err.message || '网络错误');
            fetchStatus.className = 'status error';
          });
      });

      function formatNum(n) {
        if (n == null || n === '' || isNaN(n)) return '--';
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      }

      var listMonthPicker = document.getElementById('listMonthPicker');
      var btnRefreshList = document.getElementById('btnRefreshList');
      var dxyTableBody = document.getElementById('dxyTableBody');
      var listStatus = document.getElementById('listStatus');
      var dxyChartInstance = null;

      (function setDefaultListMonth() {
        var d = new Date();
        listMonthPicker.value = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      })();

      listMonthPicker.addEventListener('change', loadDxyList);

      function updateChart(list) {
        if (!window.Chart) return;
        var ctx = document.getElementById('dxyChart');
        if (!ctx) return;
        var sorted = list.slice().sort(function (a, b) {
          return (a.recordDate || '').localeCompare(b.recordDate || '');
        });
        var labels = sorted.map(function (r) { return r.recordDate || ''; });
        var values = sorted.map(function (r) {
          var v = parseFloat(r.closePrice);
          return isNaN(v) ? null : v;
        });
        if (dxyChartInstance) {
          dxyChartInstance.data.labels = labels;
          dxyChartInstance.data.datasets[0].data = values;
          dxyChartInstance.update();
          return;
        }
        dxyChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '收盘价',
              data: values,
              borderColor: 'rgba(96, 165, 250, 0.9)',
              backgroundColor: 'rgba(96, 165, 250, 0.1)',
              fill: true,
              tension: 0.2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#94a3b8', maxRotation: 45 }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#94a3b8' }
              }
            }
          }
        });
      }

      function loadDxyList() {
        listStatus.textContent = '加载中…';
        listStatus.className = 'status loading';
        var val = (listMonthPicker.value || '').trim();
        var year = '';
        var month = '';
        if (val) {
          var parts = val.split('-');
          year = parts[0] || '';
          month = parts[1] || '';
        }
        var url = '/api/dollar-index/list?year=' + encodeURIComponent(year) + '&month=' + encodeURIComponent(month);
        fetch(url)
          .then(function (res) { return res.json(); })
          .then(function (result) {
            listStatus.textContent = '';
            listStatus.className = 'status';
            var list = (result && result.data) ? result.data : [];
            if (list.length === 0) {
              dxyTableBody.innerHTML = '<tr><td colspan="2" class="empty-tip">暂无数据</td></tr>';
              updateChart([]);
              return;
            }
            dxyTableBody.innerHTML = list.map(function (row) {
              var date = row.recordDate || '--';
              var close = formatNum(row.closePrice);
              return '<tr><td>' + date + '</td><td class="value-close">' + close + '</td></tr>';
            }).join('');
            updateChart(list);
          })
          .catch(function (err) {
            listStatus.textContent = '加载失败：' + (err.message || '网络错误');
            listStatus.className = 'status error';
            dxyTableBody.innerHTML = '';
          });
      }

      btnRefreshList.addEventListener('click', loadDxyList);
      loadDxyList();
    })();
  </script>
</body>
</html>
