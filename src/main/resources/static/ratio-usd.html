<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美元计价金银比</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { text-align: center; color: #a0a0a0; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      background: rgba(240, 193, 75, 0.2);
      color: #f0c14b;
      border: 1px solid rgba(240, 193, 75, 0.4);
    }
    .btn:hover { background: rgba(240, 193, 75, 0.3); }
    .status { text-align: center; padding: 12px; color: #a0a0a0; font-size: 0.9rem; }
    .status.loading { color: #f0c14b; }
    .status.error { color: #e57373; }
    .card.feed h2 { font-size: 1rem; color: #a0a0a0; margin: 0 0 16px 0; font-weight: 500; }
    .form-row-month {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-row-month label { color: #a0a0a0; font-size: 0.9rem; flex-shrink: 0; }
    .form-row-month .month-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 200px;
    }
    .form-row-month .month-select-wrap select {
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-row-month .month-select-wrap select option {
      background: #16213e;
      color: #fff;
    }
    .table-wrap { overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { color: #a0a0a0; font-weight: 500; }
    td.value-gold { color: #f0c14b; }
    td.value-silver { color: #c0c0c0; }
    .empty-tip { color: #666; padding: 24px; text-align: center; }
    .chart-wrap { position: relative; height: 220px; margin-top: 16px; margin-bottom: 16px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>美元计价金银比</h1>
    <p class="subtitle">Gold / Silver Ratio (USD) · 数据来源：GoldAPI · 美元/盎司</p>

    <div class="card feed">
      <h2>每日金银比</h2>
      <div class="form-row-month">
        <label>年月</label>
        <div class="month-select-wrap">
          <select id="listYear"></select><span>年</span>
          <select id="listMonth"></select><span>月</span>
        </div>
      </div>
      <button type="button" class="btn" id="btnRefreshList">刷新列表</button>
      <div class="chart-wrap">
        <canvas id="ratioChart"></canvas>
      </div>
      <div class="table-wrap">
        <table id="ratioTable">
          <thead>
            <tr>
              <th>数据日期</th>
              <th>金价 (USD/oz)</th>
              <th>银价 (USD/oz)</th>
              <th>金银比</th>
              <th>数据来源</th>
            </tr>
          </thead>
          <tbody id="ratioTableBody"></tbody>
        </table>
      </div>
      <div class="status" id="listStatus"></div>
    </div>

    <p style="text-align:center;margin-top:24px;">
      <a href="/" style="color:#888;font-size:0.9rem;">返回首页</a>
    </p>
  </div>

  <script>
    (function () {
      function formatNum(n) {
        if (n == null || n === '' || isNaN(n)) return '--';
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      }

      function populateYearMonth(yearSel, monthSel) {
        var now = new Date();
        var curYear = now.getFullYear();
        var curMonth = now.getMonth() + 1;
        for (var y = curYear; y >= curYear - 5; y--) {
          var opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearSel.appendChild(opt);
        }
        yearSel.value = curYear;
        for (var m = 1; m <= 12; m++) {
          var opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          monthSel.appendChild(opt);
        }
        monthSel.value = curMonth;
      }

      var listYear = document.getElementById('listYear');
      var listMonth = document.getElementById('listMonth');
      var btnRefreshList = document.getElementById('btnRefreshList');
      var ratioTableBody = document.getElementById('ratioTableBody');
      var listStatus = document.getElementById('listStatus');
      var ratioChartInstance = null;
      populateYearMonth(listYear, listMonth);

      listYear.addEventListener('change', loadRatioList);
      listMonth.addEventListener('change', loadRatioList);

      function updateChart(list) {
        if (!window.Chart) return;
        var ctx = document.getElementById('ratioChart');
        if (!ctx) return;
        var sorted = list.slice().sort(function (a, b) {
          return (a.recordDate || '').localeCompare(b.recordDate || '');
        });
        var labels = sorted.map(function (r) { return r.recordDate || ''; });
        var values = sorted.map(function (r) {
          var v = parseFloat(r.ratio);
          return isNaN(v) ? null : v;
        });
        if (ratioChartInstance) {
          ratioChartInstance.data.labels = labels;
          ratioChartInstance.data.datasets[0].data = values;
          ratioChartInstance.update();
          return;
        }
        ratioChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '金银比',
              data: values,
              borderColor: 'rgba(240, 193, 75, 0.9)',
              backgroundColor: 'rgba(240, 193, 75, 0.1)',
              fill: true,
              tension: 0.2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#a0a0a0', maxRotation: 45 }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#a0a0a0' }
              }
            }
          }
        });
      }

      function loadRatioList() {
        listStatus.textContent = '加载中…';
        listStatus.className = 'status loading';
        var year = listYear.value;
        var month = listMonth.value;
        var url = '/api/ratio-usd/list?year=' + encodeURIComponent(year) + '&month=' + encodeURIComponent(month);
        fetch(url)
          .then(function (res) { return res.json(); })
          .then(function (result) {
            listStatus.textContent = '';
            listStatus.className = 'status';
            var list = (result && result.data) ? result.data : [];
            if (list.length === 0) {
              ratioTableBody.innerHTML = '<tr><td colspan="5" class="empty-tip">暂无数据，请到<a href="/shfe-fetch-data.html" style="color:#f0c14b;">数据同步</a>页同步美元计价金银比</td></tr>';
              updateChart([]);
              return;
            }
            ratioTableBody.innerHTML = list.map(function (row) {
              var date = row.recordDate || '--';
              var gold = formatNum(row.goldPrice);
              var silver = formatNum(row.silverPrice);
              var ratio = formatNum(row.ratio);
              var src = row.dataSource === 'jisuapi' ? '极速数据' : (row.dataSource === 'manual' ? '手动' : 'GoldAPI');
              return '<tr><td>' + date + '</td><td class="value-gold">' + gold + '</td><td class="value-silver">' + silver + '</td><td>' + ratio + '</td><td>' + src + '</td></tr>';
            }).join('');
            updateChart(list);
          })
          .catch(function (err) {
            listStatus.textContent = '加载失败：' + (err.message || '网络错误');
            listStatus.className = 'status error';
            ratioTableBody.innerHTML = '';
            updateChart([]);
          });
      }

      btnRefreshList.addEventListener('click', loadRatioList);
      loadRatioList();
    })();
  </script>
</body>
</html>
