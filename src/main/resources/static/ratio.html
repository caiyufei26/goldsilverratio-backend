<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金银比</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { text-align: center; color: #a0a0a0; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      background: rgba(240, 193, 75, 0.2);
      color: #f0c14b;
      border: 1px solid rgba(240, 193, 75, 0.4);
    }
    .btn:hover { background: rgba(240, 193, 75, 0.3); }
    .status { text-align: center; padding: 12px; color: #a0a0a0; font-size: 0.9rem; }
    .status.loading { color: #f0c14b; }
    .status.error { color: #e57373; }
    .card.feed h2 { font-size: 1rem; color: #a0a0a0; margin: 0 0 16px 0; font-weight: 500; }
    .hint { color: #888; font-size: 0.8rem; margin-bottom: 12px; line-height: 1.4; }
    .btn.primary {
      background: rgba(240, 193, 75, 0.25);
      color: #f0c14b;
      border-color: rgba(240, 193, 75, 0.5);
      width: 100%;
      margin-top: 8px;
    }
    .btn.primary:hover { background: rgba(240, 193, 75, 0.35); }
    .form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .form-row label { width: 100px; color: #a0a0a0; font-size: 0.9rem; }
    .form-row input {
      flex: 1;
      max-width: 160px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
    }
    .table-wrap { overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { color: #a0a0a0; font-weight: 500; }
    td.value-gold { color: #f0c14b; }
    td.value-silver { color: #c0c0c0; }
    .empty-tip { color: #666; padding: 24px; text-align: center; }
    .chart-wrap { position: relative; height: 220px; margin-top: 16px; margin-bottom: 16px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>金银比</h1>
    <p class="subtitle">Gold / Silver Ratio · 美元/盎司</p>

    <div class="card feed">
      <h2>按日期获取数据</h2>
      <p class="hint">选择日期后点击按钮，从 GoldAPI 获取该日金/银价并同步到服务器（周末将按前一交易日获取）。</p>
      <div class="form-row">
        <label>数据日期</label>
        <input type="date" id="inputFetchDate">
      </div>
      <button type="button" class="btn primary" id="btnFetchByDate">获取该日期数据并保存</button>
      <div class="status" id="byDateFeedStatus"></div>
    </div>

    <div class="card feed">
      <h2>每日金银比</h2>
      <p class="hint">已同步到服务器的每日金价、银价与金银比。</p>
      <button type="button" class="btn" id="btnRefreshList">刷新列表</button>
      <div class="chart-wrap">
        <canvas id="ratioChart"></canvas>
      </div>
      <div class="table-wrap">
        <table id="ratioTable">
          <thead>
            <tr>
              <th>数据日期</th>
              <th>金价 (USD)</th>
              <th>银价 (USD)</th>
              <th>金银比</th>
            </tr>
          </thead>
          <tbody id="ratioTableBody"></tbody>
        </table>
      </div>
      <div class="status" id="listStatus"></div>
    </div>

    <p style="text-align:center;margin-top:24px;">
      <a href="/" style="color:#888;font-size:0.9rem;">返回首页</a>
    </p>
  </div>

  <script>
    (function () {
      function formatNum(n) {
        if (n == null || n === '' || isNaN(n)) return '--';
        return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      }

      function toTradeDateYYYYMMDD(dateStr) {
        var y = parseInt(dateStr.slice(0, 4), 10);
        var m = parseInt(dateStr.slice(5, 7), 10) - 1;
        var day = parseInt(dateStr.slice(8, 10), 10);
        var d = new Date(y, m, day);
        var dow = d.getDay();
        if (dow === 0) d.setDate(d.getDate() - 2);
        else if (dow === 6) d.setDate(d.getDate() - 1);
        var yy = d.getFullYear();
        var mm = d.getMonth() + 1;
        var dd = d.getDate();
        return '' + yy + (mm < 10 ? '0' : '') + mm + (dd < 10 ? '0' : '') + dd;
      }

      var inputFetchDate = document.getElementById('inputFetchDate');
      var btnFetchByDate = document.getElementById('btnFetchByDate');
      var byDateFeedStatus = document.getElementById('byDateFeedStatus');

      (function setDefaultDate() {
        var d = new Date();
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        inputFetchDate.value = y + '-' + (m < 10 ? '0' : '') + m + '-' + (day < 10 ? '0' : '') + day;
      })();

      btnFetchByDate.addEventListener('click', function () {
        var dateVal = (inputFetchDate.value || '').trim();
        if (!dateVal) {
          byDateFeedStatus.textContent = '请选择日期';
          byDateFeedStatus.className = 'status error';
          return;
        }
        var dateStr = toTradeDateYYYYMMDD(dateVal);
        btnFetchByDate.disabled = true;
        byDateFeedStatus.textContent = '正在获取并保存…';
        byDateFeedStatus.className = 'status loading';
        fetch('/api/ratio/fetch-date?date=' + dateStr, { method: 'POST' })
          .then(function (res) { return res.json(); })
          .then(function (result) {
            btnFetchByDate.disabled = false;
            if (result && result.code === 200) {
              byDateFeedStatus.textContent = '已保存';
              byDateFeedStatus.className = 'status';
              loadRatioList();
            } else {
              byDateFeedStatus.textContent = (result && result.message) || '保存失败';
              byDateFeedStatus.className = 'status error';
            }
          })
          .catch(function (err) {
            btnFetchByDate.disabled = false;
            byDateFeedStatus.textContent = '请求失败：' + (err.message || '网络错误');
            byDateFeedStatus.className = 'status error';
          });
      });

      var btnRefreshList = document.getElementById('btnRefreshList');
      var ratioTableBody = document.getElementById('ratioTableBody');
      var listStatus = document.getElementById('listStatus');
      var ratioChartInstance = null;

      function updateChart(list) {
        if (!window.Chart) return;
        var ctx = document.getElementById('ratioChart');
        if (!ctx) return;
        var sorted = list.slice().sort(function (a, b) {
          return (a.recordDate || '').localeCompare(b.recordDate || '');
        });
        var labels = sorted.map(function (r) { return r.recordDate || ''; });
        var values = sorted.map(function (r) {
          var v = parseFloat(r.ratio);
          return isNaN(v) ? null : v;
        });
        if (ratioChartInstance) {
          ratioChartInstance.data.labels = labels;
          ratioChartInstance.data.datasets[0].data = values;
          ratioChartInstance.update();
          return;
        }
        ratioChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '金银比',
              data: values,
              borderColor: 'rgba(240, 193, 75, 0.9)',
              backgroundColor: 'rgba(240, 193, 75, 0.1)',
              fill: true,
              tension: 0.2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#a0a0a0', maxRotation: 45 }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.06)' },
                ticks: { color: '#a0a0a0' }
              }
            }
          }
        });
      }

      function loadRatioList() {
        listStatus.textContent = '加载中…';
        listStatus.className = 'status loading';
        fetch('/api/ratio/list?page=1&size=100')
          .then(function (res) { return res.json(); })
          .then(function (result) {
            listStatus.textContent = '';
            listStatus.className = 'status';
            var list = (result && result.data) ? result.data : [];
            if (list.length === 0) {
              ratioTableBody.innerHTML = '<tr><td colspan="4" class="empty-tip">暂无数据，请先同步</td></tr>';
              updateChart([]);
              return;
            }
            ratioTableBody.innerHTML = list.map(function (row) {
              var date = row.recordDate || '--';
              var gold = formatNum(row.goldPrice);
              var silver = formatNum(row.silverPrice);
              var ratio = formatNum(row.ratio);
              return '<tr><td>' + date + '</td><td class="value-gold">' + gold + '</td><td class="value-silver">' + silver + '</td><td>' + ratio + '</td></tr>';
            }).join('');
            updateChart(list);
          })
          .catch(function (err) {
            listStatus.textContent = '加载失败：' + (err.message || '网络错误');
            listStatus.className = 'status error';
            ratioTableBody.innerHTML = '';
            updateChart([]);
          });
      }

      btnRefreshList.addEventListener('click', loadRatioList);
      loadRatioList();
    })();
  </script>
</body>
</html>
