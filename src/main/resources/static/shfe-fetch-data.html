<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据同步</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    .container { max-width: 520px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 { font-size: 1rem; color: #94a3b8; margin: 0 0 16px 0; font-weight: 500; }
    .hint { color: #64748b; font-size: 0.8rem; margin-bottom: 16px; line-height: 1.5; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      background: rgba(20, 184, 166, 0.2);
      color: #2dd4bf;
      border: 1px solid rgba(20, 184, 166, 0.4);
    }
    .btn:hover { background: rgba(20, 184, 166, 0.3); }
    .btn.primary {
      background: rgba(20, 184, 166, 0.25);
      color: #e8e8e8;
      border-color: rgba(20, 184, 166, 0.5);
      width: 100%;
      margin-top: 8px;
    }
    .btn.primary:hover { background: rgba(20, 184, 166, 0.35); }
    .btn.primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn + .btn { margin-top: 10px; }
    .status { text-align: center; padding: 12px; color: #94a3b8; font-size: 0.9rem; white-space: pre-line; }
    .status.loading { color: #2dd4bf; }
    .status.error { color: #e57373; }
    .form-row-month {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-row-month label { color: #94a3b8; font-size: 0.9rem; flex-shrink: 0; }
    .form-row-month .month-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 200px;
    }
    .form-row-month .month-select-wrap select {
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-row-month .month-select-wrap select option {
      background: #1e293b;
      color: #fff;
    }
    .form-row-date {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .form-row-date label { color: #94a3b8; font-size: 0.9rem; flex-shrink: 0; }
    .form-row-date .date-select-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .form-row-date .date-select-wrap select {
      padding: 10px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      min-width: 4.5em;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-row-date .date-select-wrap select option {
      background: #1e293b;
      color: #fff;
    }
    .form-row-date .btn { flex-shrink: 0; margin-left: 4px; }
    .links { margin-top: 20px; font-size: 0.85rem; color: #64748b; }
    .links a { color: #94a3b8; margin-right: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>数据同步</h1>
    <p class="subtitle">金银比 · 库存 · 交易数据 · 美元指数 · 按月份同步 · 每日 17:30 自动执行本月</p>

    <div class="card">
      <h2>一键同步全部</h2>
      <p class="hint">选择月份后同步该月的：金银比（按该月每个交易日逐日拉取）、上期所交易数据与库存（白银+燃油）、美元指数。默认本月。</p>
      <div class="form-row-month">
        <label>按月份</label>
        <div class="month-select-wrap">
          <select id="syncYear"></select><span>年</span>
          <select id="syncMonth"></select><span>月</span>
        </div>
      </div>
      <button type="button" class="btn primary" id="btnSyncAll">同步该月数据</button>
      <div class="status" id="syncAllStatus"></div>
    </div>

    <div class="card">
      <h2>美元计价金银比（独立同步，不参与一键）</h2>
      <p class="hint">从国际贵金属报价接口拉取 XAU/USD、XAG/USD，需在 application.yml 中配置对应 token。可按日或按月拉取。</p>
      <div class="form-row-date">
        <label>按日</label>
        <div class="date-select-wrap">
          <select id="ratioUsdDateYear"></select><span>年</span>
          <select id="ratioUsdDateMonth"></select><span>月</span>
          <select id="ratioUsdDateDay"></select><span>日</span>
        </div>
        <button type="button" class="btn" id="btnRatioUsdDate">拉取该日</button>
      </div>
      <div class="form-row-month">
        <label>按月份</label>
        <div class="month-select-wrap">
          <select id="ratioUsdYear"></select><span>年</span>
          <select id="ratioUsdMonth"></select><span>月</span>
        </div>
      </div>
      <button type="button" class="btn" id="btnRatioUsdMonth">同步该月</button>
      <div class="status" id="ratioUsdStatus"></div>
    </div>

    <p style="text-align:center;margin-top:24px;">
      <a href="/" style="color:#64748b;font-size:0.9rem;">返回首页</a>
    </p>
    <p class="links" style="text-align:center;">
      <a href="/ratio.html">金银比</a>
      <a href="/ratio-usd.html">美元计价金银比</a>
      <a href="/dollar-index.html">美元指数</a>
      <a href="/shfe-trade-daily.html">白银每日交易数据</a>
      <a href="/shfe-trade-daily.html?product=fu">燃油每日交易数据</a>
      <a href="/silver-inventory.html">白银库存</a>
      <a href="/silver-inventory.html?product=fu">燃油库存</a>
    </p>
  </div>

  <script>
    (function () {
      function populateYearMonth(yearSel, monthSel) {
        var now = new Date();
        var curYear = now.getFullYear();
        var curMonth = now.getMonth() + 1;
        for (var y = curYear; y >= curYear - 5; y--) {
          var opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearSel.appendChild(opt);
        }
        yearSel.value = curYear;
        for (var m = 1; m <= 12; m++) {
          var opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m;
          monthSel.appendChild(opt);
        }
        monthSel.value = curMonth;
      }

      var syncYear = document.getElementById('syncYear');
      var syncMonth = document.getElementById('syncMonth');
      var syncAllStatus = document.getElementById('syncAllStatus');
      var btnSyncAll = document.getElementById('btnSyncAll');
      populateYearMonth(syncYear, syncMonth);

      var ratioUsdDateYear = document.getElementById('ratioUsdDateYear');
      var ratioUsdDateMonth = document.getElementById('ratioUsdDateMonth');
      var ratioUsdDateDay = document.getElementById('ratioUsdDateDay');
      var ratioUsdYear = document.getElementById('ratioUsdYear');
      var ratioUsdMonth = document.getElementById('ratioUsdMonth');
      var ratioUsdStatus = document.getElementById('ratioUsdStatus');
      var btnRatioUsdDate = document.getElementById('btnRatioUsdDate');
      var btnRatioUsdMonth = document.getElementById('btnRatioUsdMonth');
      if (ratioUsdYear && ratioUsdMonth) populateYearMonth(ratioUsdYear, ratioUsdMonth);
      if (ratioUsdDateYear && ratioUsdDateMonth) populateYearMonth(ratioUsdDateYear, ratioUsdDateMonth);
      if (ratioUsdDateDay) {
        var now = new Date();
        for (var d = 1; d <= 31; d++) {
          var opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          ratioUsdDateDay.appendChild(opt);
        }
        ratioUsdDateDay.value = now.getDate();
      }

      if (btnRatioUsdDate) {
        btnRatioUsdDate.addEventListener('click', function () {
          var y = ratioUsdDateYear.value;
          var m = ratioUsdDateMonth.value;
          var d = ratioUsdDateDay.value;
          if (m.length === 1) m = '0' + m;
          if (d.length === 1) d = '0' + d;
          var dateStr = y + m + d;
          ratioUsdStatus.textContent = '拉取中…';
          ratioUsdStatus.className = 'status loading';
          fetch('/api/ratio-usd/fetch-date?date=' + encodeURIComponent(dateStr), { method: 'POST' })
            .then(function (r) { return r.json(); })
            .then(function (res) {
              ratioUsdStatus.textContent = (res && res.code === 200) ? (res.data || '已保存') : (res.message || '失败');
              ratioUsdStatus.className = 'status' + (res && res.code === 200 ? '' : ' error');
            })
            .catch(function (err) {
              ratioUsdStatus.textContent = '失败：' + (err.message || '网络错误');
              ratioUsdStatus.className = 'status error';
            });
        });
      }
      if (btnRatioUsdMonth) {
        btnRatioUsdMonth.addEventListener('click', function () {
          var y = parseInt(ratioUsdYear.value, 10);
          var m = parseInt(ratioUsdMonth.value, 10);
          ratioUsdStatus.textContent = '按月考取中…';
          ratioUsdStatus.className = 'status loading';
          fetch('/api/ratio-usd/fetch-month?year=' + y + '&month=' + m, { method: 'POST' })
            .then(function (r) { return r.json(); })
            .then(function (res) {
              ratioUsdStatus.textContent = (res && res.code === 200) ? (res.data || '已保存') : (res.message || '失败');
              ratioUsdStatus.className = 'status' + (res && res.code === 200 ? '' : ' error');
            })
            .catch(function (err) {
              ratioUsdStatus.textContent = '失败：' + (err.message || '网络错误');
              ratioUsdStatus.className = 'status error';
            });
        });
      }

      btnSyncAll.addEventListener('click', function () {
        var year = parseInt(syncYear.value, 10);
        var month = parseInt(syncMonth.value, 10);

        btnSyncAll.disabled = true;
        syncAllStatus.textContent = '正在拉取该月金银比（按交易日逐日）…';
        syncAllStatus.className = 'status loading';

        function setResult(ok, text) {
          btnSyncAll.disabled = false;
          syncAllStatus.textContent = text;
          syncAllStatus.className = 'status' + (ok ? '' : ' error');
        }

        fetch('/api/ratio/fetch-month?year=' + year + '&month=' + month, { method: 'POST' })
          .then(function (res) { return res.json(); })
          .then(function (ratioResult) {
            var ratioOk = ratioResult && ratioResult.code === 200;
            var ratioText = ratioOk ? (ratioResult.data || '已保存') : (ratioResult.message || '金银比拉取失败');
            syncAllStatus.textContent = '金银比: ' + ratioText + '\n正在拉取该月交易数据…';
            return fetch('/api/shfe-trade/fetch-month?year=' + year + '&month=' + month)
              .then(function (r) { return r.json(); })
              .then(function (tradeResult) {
                var tradeOk = tradeResult && tradeResult.code === 200;
                var tradeText = tradeOk ? (tradeResult.data || '已保存') : (tradeResult.message || '失败');
                syncAllStatus.textContent = '金银比: ' + ratioText + '\n交易数据: ' + tradeText + '\n正在拉取该月库存…';
                return fetch('/api/silver-inventory/fetch-month?year=' + year + '&month=' + month)
                  .then(function (r2) { return r2.json(); })
                  .then(function (invResult) {
                    var invOk = invResult && invResult.code === 200;
                    var invText = invOk ? (invResult.data || invResult.message || '已保存') : (invResult.message || '失败');
                    syncAllStatus.textContent = '金银比: ' + ratioText + '\n交易数据: ' + tradeText + '\n库存: ' + invText + '\n正在拉取该月美元指数…';
                    return fetch('/api/dollar-index/fetch-month?year=' + year + '&month=' + month)
                      .then(function (r3) { return r3.json(); })
                      .then(function (dxyResult) {
                        var dxyOk = dxyResult && dxyResult.code === 200;
                        var dxyText = dxyOk ? (dxyResult.data || '已保存') : (dxyResult.message || '失败');
                        var allOk = ratioOk && tradeOk && invOk && dxyOk;
                        setResult(allOk, '金银比: ' + ratioText + '\n交易数据: ' + tradeText + '\n库存: ' + invText + '\n美元指数: ' + dxyText);
                      });
                  });
              });
          })
          .catch(function (err) {
            setResult(false, '失败：' + (err.message || '网络错误'));
          });
      });
    })();
  </script>
</body>
</html>
